<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SXCCE - Admission</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="admission.css">
    <style>
        /* Embedded CSS for form styling */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dept.html">Departments</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="admission.html" class="active">Admission</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Admission Form</h1>
        
        <form id="admissionForm" action="#" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="gender">Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male" style="display: inline;">Male</label>
                    
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female" style="display: inline;">Female</label>
                    
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other" style="display: inline;">Other</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required>
            </div>
            
            <div class="form-group">
                <label for="course">Course Applied For:</label>
                <select id="course" name="course" required>
                    <option value="">Select Course</option>
                    <option value="btech-cse">B.Tech Computer Science</option>
                    <option value="btech-ece">B.Tech Electronics</option>
                    <option value="btech-mech">B.Tech Mechanical</option>
                    <option value="btech-civil">B.Tech Civil</option>
                    <option value="mtech-cse">M.Tech Computer Science</option>
                    <option value="mtech-ece">M.Tech Electronics</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="address">Address:</label>
                <textarea id="address" name="address" rows="4" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="documents">Upload Documents:</label>
                <input type="file" id="documents" name="documents" multiple>
            </div>
            
            <div class="form-group">
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree" style="display: inline;">I agree to the terms and conditions</label>
            </div>
            
            <button type="submit">Submit Application</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 SXCCE. All rights reserved.</p>
    </footer>
</body>
</html>
