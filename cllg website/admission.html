<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admission — SXCCE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <img src="image8.png" alt="College logo" height="50" width="175">
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="dept.html">Departments</a>
        <a href="gallery.html">Gallery</a>
        <a href="admission.html" class="active">Admission</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2>Admission Form</h2>
    <form id="admissionForm" class="form-card" enctype="multipart/form-data" novalidate>
      <label>
        Full Name
        <input type="text" name="fullname" required minlength="3" placeholder="Your full name">
      </label>

      <label>
        Email
        <input type="email" name="email" required placeholder="name@example.com">
      </label>

      <label>
        Phone
        <input type="tel" name="phone" pattern="[0-9]{10}" placeholder="10 digit phone" required>
      </label>

      <label>
        Course applying for
        <select name="course" required>
          <option value="">Select a course</option>
          <option>B.Tech Computer Science</option>
          <option>B.Tech ECE</option>
          <option>B.Tech Mechanical</option>
        </select>
      </label>

      <label>
        Gender
        <div class="form-row-inline">
          <label><input type="radio" name="gender" value="male" required> Male</label>
          <label><input type="radio" name="gender" value="female"> Female</label>
          <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
      </label>

      <label>
        Prior Qualifications / Remarks
        <textarea name="remarks" rows="4" placeholder="Briefly describe your qualifications"></textarea>
      </label>

      <label>
        Upload Documents (pdf/png)
        <input type="file" name="docs" accept=".pdf,image/*">
      </label>

      <button type="submit" class="btn">Submit Application</button>
      <div id="formMsg" class="form-msg" role="status" aria-live="polite"></div>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> St. Xavier's Catholic College of Engineering — All rights reserved.</p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
