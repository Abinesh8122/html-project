<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <input type="number" id="a1">
        <input type="number" id="a2">
    </form>
    <button onclick="add()">+</button>
    <button onclick="sub()">-</button>
    <button onclick="mul()">*</button>
    <button onclick="div()">/</button>
    <p id="a3"></p>
</body>
<script>
    function add(){
let a=Number(document.getElementById('a1').value);
let b=Number(document.getElementById('a2').value);
a3.innerText=a+b;
    }
    function sub(){
let a=Number(document.getElementById('a1').value);
let b=Number(document.getElementById('a2').value);
a3.innerText=a-b;
    }
    function mul(){
let a=Number(document.getElementById('a1').value);
let b=Number(document.getElementById('a2').value);
a3.innerText=a*b;
    }
    function div(){
let a=Number(document.getElementById('a1').value);
let b=Number(document.getElementById('a2').value);
if(b==0){
    document.write('cannot divide by zero');
}
else{
a3.innerText=a/b;
}
    }
</script>
</html>
