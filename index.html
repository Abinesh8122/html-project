<!DOCTYPE html>
<html>
<head>
    <title>Advanced CSS Design</title>
    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png"),
                              linear-gradient(to right, #4facfe, #00f2fe);
            background-repeat: repeat, no-repeat;
            background-size: auto, cover;
        }
        header {
            text-align: center;
            padding: 30px;
            color: white;
            font-size: 28px;

            
            background: linear-gradient(45deg, purple, blue);
        }
        .card {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: white;

            
            border-radius: 20px;

            
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);

            
            transition: transform 0.5s, box-shadow 0.5s;
        }

        .card:hover {
            
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }

        
        .border-box {
            width: 250px;
            margin: 30px auto;
            padding: 20px;
            border: 15px solid transparent;
            border-image: url("https://www.w3schools.com/css/border.png") 30 round;
        }

        .box3d {
            width: 150px;
            height: 150px;
            margin: 30px auto;
            background: coral;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;

            transition: transform 1s;
        }

        .box3d:hover {
            transform: rotateY(180deg);
        }

        .animated-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 25px;
            background: linear-gradient(to right, orange, red);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;

            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <header>
        Advanced CSS Effects Demo
    </header>

    <div class="card">
        <h2>Hover Me!</h2>
        <p>This card uses rounded corners, shadow, transition and 2D transform.</p>
    </div>

    <div class="border-box">
        This box uses CSS Border Image.
    </div>

    <div class="box3d">
        3D Rotate
    </div>

    <button class="animated-btn">
        Animated Button
    </button>

</body>
</html>
