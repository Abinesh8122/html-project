<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="a1">red</button>
    <button id="a2">green</button>
    <button id="a3">blue</button>
</body>
<script>
    let b1=document.getElementById('a1')
    let b2=document.getElementById('a2')
    let b3=document.getElementById('a3')
    let b4=document.getElementsByTagName("body")[0];
    b1.addEventListener('click',()=>{
      b4.style.backgroundColor='red'
    })
    b2.addEventListener('click',()=>{
      b4.style.backgroundColor='green'
    })
    b3.addEventListener('click',()=>{
      b4.style.backgroundColor='blue'
    })
</script>
</html>
